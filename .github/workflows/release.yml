name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Build
        run: cargo build --release

      - name: Verify binary version
        run: test "$(target/release/slides --version | awk '{print $2}')" = "${GITHUB_REF_NAME#v}"

      - name: Package
        run: tar czf slides-${{ matrix.target }}.tar.gz -C target/release slides

      - uses: actions/upload-artifact@v4
        with:
          name: slides-${{ matrix.target }}
          path: slides-${{ matrix.target }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          files: slides-*.tar.gz
